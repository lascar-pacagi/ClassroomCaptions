<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1240 430" role="img" aria-labelledby="t d">
  <title id="t">Gemma correction capability and validation pipeline</title>
  <desc id="d">Raw text is quoted into a correction request. Gemma can return only text. Swift validates the candidate before attaching it, otherwise raw text remains visible.</desc>
  <defs><marker id="a" markerWidth="11" markerHeight="11" refX="10" refY="4" orient="auto"><path d="M0 0L10 4L0 8Z" fill="#334155"/></marker><style>.h{font:700 25px sans-serif;fill:#172033}.n{font:700 16px sans-serif;fill:#172033}.s{font:13px sans-serif;fill:#475569}.b{fill:#f8fafc;stroke:#475569;stroke-width:2}.g{fill:#ecfdf5;stroke:#15803d;stroke-width:2}.r{fill:#fff1f0;stroke:#b42318;stroke-width:2}.l{fill:none;stroke:#334155;stroke-width:2.5;marker-end:url(#a)}</style></defs>
  <text x="35" y="40" class="h">The model has text capability, not application capability</text>
  <rect x="35" y="105" width="205" height="90" rx="10" class="b"/><text x="138" y="140" text-anchor="middle" class="n">Immutable raw caption</text><text x="138" y="165" text-anchor="middle" class="s">evidence remains stored</text>
  <rect x="290" y="105" width="210" height="90" rx="10" class="b"/><text x="395" y="140" text-anchor="middle" class="n">Quoted JSON request</text><text x="395" y="165" text-anchor="middle" class="s">context + target + policy</text>
  <rect x="550" y="105" width="180" height="90" rx="10" class="b"/><text x="640" y="140" text-anchor="middle" class="n">Gemma 26B</text><text x="640" y="165" text-anchor="middle" class="s">candidate string only</text>
  <rect x="780" y="105" width="205" height="90" rx="10" class="b"/><text x="883" y="140" text-anchor="middle" class="n">Swift validator</text><text x="883" y="165" text-anchor="middle" class="s">markup, question, length, edit bounds</text>
  <rect x="1035" y="75" width="170" height="75" rx="10" class="g"/><text x="1120" y="107" text-anchor="middle" class="n">Accepted</text><text x="1120" y="130" text-anchor="middle" class="s">attach correctedText</text>
  <rect x="1035" y="190" width="170" height="75" rx="10" class="r"/><text x="1120" y="222" text-anchor="middle" class="n">Rejected/failure</text><text x="1120" y="245" text-anchor="middle" class="s">display rawText</text>
  <path d="M240 150H290" class="l"/><path d="M500 150H550" class="l"/><path d="M730 150H780" class="l"/><path d="M985 135L1035 113" class="l"/><path d="M985 165L1035 223" class="l"/>
  <text x="35" y="325" class="s">Not available to the model: microphone control, window control, network listener, filesystem API, shell, tools, or object references.</text>
  <text x="35" y="365" class="s">Prompt instructions reduce bad candidates. Capability absence and deterministic validation determine what can affect the application.</text>
</svg>
