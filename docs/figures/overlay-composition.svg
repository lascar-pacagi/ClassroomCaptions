<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1160 480" role="img" aria-labelledby="title desc">
  <title id="title">Overlay ownership and composition</title>
  <desc id="desc">The AppKit controller owns the panel and installs both a SwiftUI hosting view for rendering and an interaction view for moving and resizing.</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L9,3 L0,6 Z" fill="#334155"/>
    </marker>
    <style>
      .title { font: 700 26px sans-serif; fill: #172033; }
      .controller { fill: #eef6ff; stroke: #1769aa; stroke-width: 3; }
      .panel { fill: #f8fafc; stroke: #475569; stroke-width: 2; }
      .render { fill: #ecfdf5; stroke: #15803d; stroke-width: 2; }
      .input { fill: #fff7ed; stroke: #b45309; stroke-width: 2; }
      .name { font: 700 18px sans-serif; fill: #172033; }
      .detail { font: 14px sans-serif; fill: #475569; }
      .line { fill: none; stroke: #334155; stroke-width: 3; marker-end: url(#arrow); }
      .label { font: 14px sans-serif; fill: #334155; }
    </style>
  </defs>
  <text x="40" y="44" class="title">AppKit owns the window; SwiftUI renders its content</text>

  <rect x="390" y="75" width="380" height="90" rx="12" class="controller"/>
  <text x="580" y="110" text-anchor="middle" class="name">CaptionOverlayController</text>
  <text x="580" y="138" text-anchor="middle" class="detail">lifetime, geometry, display, level, Spaces behavior</text>

  <rect x="390" y="225" width="380" height="90" rx="12" class="panel"/>
  <text x="580" y="260" text-anchor="middle" class="name">NSPanel</text>
  <text x="580" y="288" text-anchor="middle" class="detail">borderless, non-activating overlay window</text>

  <rect x="70" y="380" width="430" height="78" rx="12" class="render"/>
  <text x="285" y="411" text-anchor="middle" class="name">NSHostingView&lt;CaptionOverlayView&gt;</text>
  <text x="285" y="437" text-anchor="middle" class="detail">draws captions, provisional text, and questions</text>

  <rect x="660" y="380" width="430" height="78" rx="12" class="input"/>
  <text x="875" y="411" text-anchor="middle" class="name">OverlayInteractionView</text>
  <text x="875" y="437" text-anchor="middle" class="detail">converts pointer gestures into move and resize operations</text>

  <path d="M580 165 V225" class="line"/>
  <path d="M500 315 V345 H285 V380" class="line"/>
  <path d="M660 315 V345 H875 V380" class="line"/>
  <text x="593" y="200" class="label">owns</text>
  <text x="300" y="360" class="label">content view</text>
  <text x="890" y="360" class="label">input layer</text>
</svg>
