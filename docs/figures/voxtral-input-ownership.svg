<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1240 520" role="img" aria-labelledby="title description">
  <title id="title">Ownership across Voxtral input and weight loading</title>
  <desc id="description">Waveform data becomes owned Mel storage, tokenizer IDs borrow byte pieces, and safetensors access chooses borrowed mapped BF16 or owned converted buffers.</desc>
  <defs>
    <marker id="arrow" markerWidth="11" markerHeight="11" refX="10" refY="4" orient="auto">
      <path d="M0 0L10 4L0 8Z" fill="#1769aa"/>
    </marker>
    <style>
      .heading{font:700 25px sans-serif;fill:#172033}
      .name{font:700 16px sans-serif;fill:#172033}
      .small{font:13px sans-serif;fill:#475569}
      .owned{fill:#eef6ff;stroke:#1769aa;stroke-width:2}
      .borrowed{fill:#f5f3ff;stroke:#6d4bc3;stroke-width:2}
      .disk{fill:#f8fafc;stroke:#475569;stroke-width:2}
      .arrow{fill:none;stroke:#1769aa;stroke-width:3;marker-end:url(#arrow)}
      .label{font:13px sans-serif;fill:#334155;paint-order:stroke;stroke:white;stroke-width:4px}
    </style>
  </defs>
  <text x="35" y="42" class="heading">Every pointer belongs to one of three lifetime classes</text>

  <rect x="35" y="100" width="215" height="90" rx="10" class="disk"/>
  <text x="142" y="134" text-anchor="middle" class="name">PCM waveform</text>
  <text x="142" y="158" text-anchor="middle" class="small">caller-owned chunk</text>
  <rect x="330" y="100" width="240" height="90" rx="10" class="owned"/>
  <text x="450" y="134" text-anchor="middle" class="name">vox_mel_ctx</text>
  <text x="450" y="158" text-anchor="middle" class="small">copies unresolved samples</text>
  <rect x="650" y="100" width="240" height="90" rx="10" class="borrowed"/>
  <text x="770" y="134" text-anchor="middle" class="name">vox_mel_data</text>
  <text x="770" y="158" text-anchor="middle" class="small">borrowed until mutation</text>
  <rect x="970" y="100" width="235" height="90" rx="10" class="disk"/>
  <text x="1087" y="134" text-anchor="middle" class="name">Encoder consumer</text>
  <text x="1087" y="158" text-anchor="middle" class="small">uses rows before discard</text>
  <path d="M250 145H330" class="arrow"/><text x="268" y="130" class="label">copy</text>
  <path d="M570 145H650" class="arrow"/><text x="585" y="130" class="label">borrow</text>
  <path d="M890 145H970" class="arrow"/><text x="907" y="130" class="label">consume</text>

  <rect x="35" y="285" width="215" height="90" rx="10" class="disk"/>
  <text x="142" y="319" text-anchor="middle" class="name">Safetensors file</text>
  <text x="142" y="343" text-anchor="middle" class="small">read-only mmap owner</text>
  <rect x="330" y="245" width="240" height="90" rx="10" class="borrowed"/>
  <text x="450" y="279" text-anchor="middle" class="name">Direct BF16 pointer</text>
  <text x="450" y="303" text-anchor="middle" class="small">dies at safetensors_close</text>
  <rect x="330" y="365" width="240" height="90" rx="10" class="owned"/>
  <text x="450" y="399" text-anchor="middle" class="name">Converted F32/BF16</text>
  <text x="450" y="423" text-anchor="middle" class="small">heap buffer; caller frees</text>
  <rect x="690" y="285" width="250" height="90" rx="10" class="disk"/>
  <text x="815" y="319" text-anchor="middle" class="name">Model component</text>
  <text x="815" y="343" text-anchor="middle" class="small">records chosen ownership</text>
  <path d="M250 325C285 325 290 290 330 290" class="arrow"/><text x="265" y="274" class="label">zero-copy</text>
  <path d="M250 335C285 335 290 410 330 410" class="arrow"/><text x="255" y="445" class="label">allocate + convert</text>
  <path d="M570 290C625 290 635 318 690 325" class="arrow"/>
  <path d="M570 410C625 410 635 350 690 335" class="arrow"/>
  <text x="985" y="315" class="name">Tokenizer contrast</text>
  <text x="985" y="343" class="small">decode(id) borrows one piece;</text>
  <text x="985" y="365" class="small">decode_seq(ids) allocates a string.</text>
</svg>
